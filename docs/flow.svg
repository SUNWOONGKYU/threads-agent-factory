<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1500" viewBox="0 0 1080 1500" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" role="img" aria-labelledby="t d">
  <title id="t">쓰레드-에이전트공장 — 관계도 + 흐름도</title>
  <desc id="d">Threads(소셜 스크레이퍼)에서 사람들이 공유한 실제 AI 활용(드러난 실사용)을 소스로 에이전트 소재를 발굴하고, 운영자가 구독 추론으로 발굴·중복판정·평가를 직접 하며, 에이전트 제조 코어로 에이전트를 만들고, 80점 게이트와 사람 승인을 통과한 것만 당신의 플랫폼에 출시하는 자가성장 에이전트 공장의 구성요소 관계도(아키텍처)와 7단계 시간순 흐름도. 구독 직접 추론과 불가피한 API 호출의 비용 경계를 색으로 구분.</desc>
  <rect x="0" y="0" width="1080" height="1500" fill="#f1f5f9"/>
  <defs>
    <marker id="ah" markerUnits="userSpaceOnUse" markerWidth="13" markerHeight="11" refX="11" refY="5.5" orient="auto"><path d="M0,0 L11,5.5 L0,11 Z" fill="#475569"/></marker>
    <marker id="ahg" markerUnits="userSpaceOnUse" markerWidth="13" markerHeight="11" refX="11" refY="5.5" orient="auto"><path d="M0,0 L11,5.5 L0,11 Z" fill="#16a34a"/></marker>
    <marker id="ahr" markerUnits="userSpaceOnUse" markerWidth="13" markerHeight="11" refX="11" refY="5.5" orient="auto"><path d="M0,0 L11,5.5 L0,11 Z" fill="#b91c1c"/></marker>
  </defs>

  <!-- 헤더 -->
  <rect x="0" y="0" width="1080" height="120" fill="#0f172a"/>
  <text x="540" y="54" text-anchor="middle" fill="#ffffff" font-size="36" font-weight="bold">쓰레드-에이전트공장 — 관계도 + 흐름도</text>
  <text x="540" y="94" text-anchor="middle" fill="#93c5fd" font-size="19">실사용 발굴 · 내용기반 중복판정 · 에이전트 제조 · 80점 게이트 · 승인 후 출시</text>

  <!-- 범례 (비용 경계) -->
  <rect x="40" y="134" width="14" height="14" rx="3" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="62" y="146" fill="#1e3a8a" font-size="14">운영자/구독 추론 (직접 · 무료)</text>
  <rect x="330" y="134" width="14" height="14" rx="3" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="352" y="146" fill="#92400e" font-size="14">불가피한 API/외부 호출 (Apify·생성·런타임)</text>
  <rect x="760" y="134" width="14" height="14" rx="3" fill="#f0fdf4" stroke="#86efac"/>
  <text x="782" y="146" fill="#15803d" font-size="14">게이트 / 승인</text>

  <!-- ========== ① 관계도 ========== -->
  <rect x="0" y="166" width="1080" height="46" fill="#ede9fe"/>
  <text x="40" y="197" fill="#6d28d9" font-size="24" font-weight="bold">① 관계도 — 구성요소와 손바뀜 (왼 → 오)</text>

  <!-- 5단 파이프라인 (한 줄, 왼→오) -->
  <!-- 1 수집 -->
  <rect x="30" y="280" width="190" height="150" rx="12" fill="#fffbeb" stroke="#fcd34d"/>
  <rect x="30" y="280" width="10" height="150" rx="5" fill="#f59e0b"/>
  <text x="56" y="318" fill="#92400e" font-size="19" font-weight="bold">① 수집</text>
  <text x="56" y="352" fill="#0f172a" font-size="15">Threads · Apify</text>
  <text x="56" y="378" fill="#0f172a" font-size="15">실활용 공유글</text>
  <text x="56" y="414" fill="#92400e" font-size="14">API</text>

  <line x1="220" y1="355" x2="236" y2="355" stroke="#475569" stroke-width="3" marker-end="url(#ah)"/>

  <!-- 2 운영자 -->
  <rect x="238" y="280" width="190" height="150" rx="12" fill="#eff6ff" stroke="#93c5fd"/>
  <rect x="238" y="280" width="10" height="150" rx="5" fill="#3b82f6"/>
  <text x="264" y="318" fill="#1d4ed8" font-size="19" font-weight="bold">② 운영자</text>
  <text x="264" y="352" fill="#0f172a" font-size="15">발굴 · 중복판정</text>
  <text x="264" y="378" fill="#0f172a" font-size="15">인기도 필터</text>
  <text x="264" y="414" fill="#1d4ed8" font-size="14">구독 — 직접·무료</text>

  <line x1="428" y1="355" x2="444" y2="355" stroke="#475569" stroke-width="3" marker-end="url(#ah)"/>

  <!-- 3 제조 코어 -->
  <rect x="446" y="280" width="190" height="150" rx="12" fill="#f5f3ff" stroke="#c4b5fd"/>
  <rect x="446" y="280" width="10" height="150" rx="5" fill="#8b5cf6"/>
  <text x="472" y="318" fill="#6d28d9" font-size="19" font-weight="bold">③ 제조 코어</text>
  <text x="472" y="352" fill="#0f172a" font-size="15">에신 방법론</text>
  <text x="472" y="378" fill="#0f172a" font-size="15">부품검증 · 10요소</text>
  <text x="472" y="414" fill="#92400e" font-size="14">구독 + 생성 API</text>

  <line x1="636" y1="355" x2="652" y2="355" stroke="#16a34a" stroke-width="3" marker-end="url(#ahg)"/>

  <!-- 4 게이트 -->
  <rect x="654" y="280" width="190" height="150" rx="12" fill="#f0fdf4" stroke="#86efac"/>
  <rect x="654" y="280" width="10" height="150" rx="5" fill="#16a34a"/>
  <text x="680" y="318" fill="#15803d" font-size="19" font-weight="bold">④ 80점 게이트</text>
  <text x="680" y="352" fill="#0f172a" font-size="15">다축 1~100 판정</text>
  <text x="680" y="378" fill="#b91c1c" font-size="15">80점 미만 = 컷</text>
  <text x="680" y="414" fill="#15803d" font-size="14">구독 — 직접 판정</text>

  <line x1="844" y1="355" x2="860" y2="355" stroke="#16a34a" stroke-width="3" marker-end="url(#ahg)"/>

  <!-- 5 출시 -->
  <rect x="862" y="280" width="188" height="150" rx="12" fill="#f0f9ff" stroke="#7dd3fc"/>
  <rect x="862" y="280" width="10" height="150" rx="5" fill="#0ea5e9"/>
  <text x="888" y="318" fill="#075985" font-size="19" font-weight="bold">⑤ 출시</text>
  <text x="888" y="352" fill="#0f172a" font-size="15">DB · 페이지 · 배포</text>
  <text x="888" y="378" fill="#b91c1c" font-size="15">★ 사람 승인</text>
  <text x="888" y="414" fill="#92400e" font-size="14">API</text>

  <!-- 흡수 루프백: 중복판정 결과 → 기존 에이전트에 흡수 -->
  <path d="M333,430 C333,478 541,478 541,432" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#ah)"/>
  <text x="437" y="504" text-anchor="middle" fill="#1d4ed8" font-size="15">중복이어도 좋은 내용은 기존 에이전트에 흡수(개선)</text>

  <!-- 관계도 ↔ 흐름도 연결 안내 -->
  <text x="540" y="588" text-anchor="middle" fill="#475569" font-size="17">위 구성요소가 일하는 순서를 펼친 것이 ↓ <tspan font-weight="bold" fill="#4338ca">② 흐름도 (7단계)</tspan></text>

  <!-- ========== ② 흐름도 ========== -->
  <rect x="0" y="664" width="1080" height="46" fill="#eef2ff"/>
  <text x="40" y="695" fill="#4338ca" font-size="24" font-weight="bold">② 흐름도 — 7단계 시간 순서 (게이트 · 분기)</text>

  <!-- 1 수집 -->
  <rect x="120" y="724" width="840" height="50" rx="12" fill="#fffbeb" stroke="#fcd34d"/>
  <rect x="120" y="724" width="12" height="50" rx="6" fill="#f59e0b"/>
  <text x="540" y="755" text-anchor="middle" fill="#0f172a" font-size="21" font-weight="bold">① 수집 — Threads/Apify · 실활용·공유 키워드 · 최신 N개월 (API)</text>
  <line x1="540" y1="774" x2="540" y2="790" stroke="#94a3b8" stroke-width="4" marker-end="url(#ah)"/>

  <!-- 2 발굴 -->
  <rect x="120" y="792" width="840" height="50" rx="12" fill="#eff6ff" stroke="#93c5fd"/>
  <rect x="120" y="792" width="12" height="50" rx="6" fill="#3b82f6"/>
  <text x="540" y="823" text-anchor="middle" fill="#0f172a" font-size="21" font-weight="bold">② 발굴 — 캡션 속 실사용에서 에이전트 소재 추출 (구독 직접)</text>
  <line x1="540" y1="842" x2="540" y2="858" stroke="#94a3b8" stroke-width="4" marker-end="url(#ah)"/>

  <!-- 3 중복성 판정 (분기 4구간) -->
  <rect x="120" y="860" width="840" height="150" rx="14" fill="#eff6ff" stroke="#93c5fd"/>
  <rect x="120" y="860" width="12" height="150" rx="6" fill="#3b82f6"/>
  <text x="160" y="896" fill="#1d4ed8" font-size="21" font-weight="bold">③ 중복성 판정 — 내용 기반 겹침률 (이름·키워드 X · 구독 직접)</text>
  <rect x="160" y="916" width="245" height="76" rx="10" fill="#ffffff" stroke="#86efac"/>
  <text x="282" y="945" text-anchor="middle" fill="#15803d" font-size="17" font-weight="bold">&lt; 50% · NEW</text>
  <text x="282" y="972" text-anchor="middle" fill="#475569" font-size="14">신규 인정 → 제조 큐</text>
  <rect x="417" y="916" width="245" height="76" rx="10" fill="#ffffff" stroke="#fcd34d"/>
  <text x="539" y="945" text-anchor="middle" fill="#92400e" font-size="17" font-weight="bold">50~79% · PARTIAL</text>
  <text x="539" y="972" text-anchor="middle" fill="#475569" font-size="14">차별기능 흡수 (+유용시 신규)</text>
  <rect x="674" y="916" width="245" height="76" rx="10" fill="#ffffff" stroke="#fda4af"/>
  <text x="796" y="945" text-anchor="middle" fill="#be123c" font-size="17" font-weight="bold">≥ 80% · DUP</text>
  <text x="796" y="972" text-anchor="middle" fill="#475569" font-size="14">신규 안 함 · 좋은내용만 흡수</text>
  <line x1="540" y1="1010" x2="540" y2="1026" stroke="#94a3b8" stroke-width="4" marker-end="url(#ah)"/>

  <!-- 4 인기도 필터 -->
  <rect x="120" y="1028" width="840" height="50" rx="12" fill="#eff6ff" stroke="#93c5fd"/>
  <rect x="120" y="1028" width="12" height="50" rx="6" fill="#3b82f6"/>
  <text x="540" y="1059" text-anchor="middle" fill="#0f172a" font-size="21" font-weight="bold">④ 인기도 필터 — 원천글 반응(♥) 임계값 미만 컷 (구독 직접)</text>
  <line x1="540" y1="1078" x2="540" y2="1094" stroke="#94a3b8" stroke-width="4" marker-end="url(#ah)"/>

  <!-- 5 제조 = 에이전트 제조 방법론 -->
  <rect x="120" y="1096" width="840" height="78" rx="14" fill="#f5f3ff" stroke="#c4b5fd"/>
  <rect x="120" y="1096" width="12" height="78" rx="6" fill="#8b5cf6"/>
  <text x="160" y="1130" fill="#6d28d9" font-size="21" font-weight="bold">⑤ 제조 = 에이전트 제조 방법론 적용</text>
  <text x="160" y="1158" fill="#0f172a" font-size="16">부품 발굴·검증(BOM) · 정체성 10요소 · 포털형 런타임 (구독 추론 + 불가피 API)</text>
  <line x1="540" y1="1174" x2="540" y2="1190" stroke="#94a3b8" stroke-width="4" marker-end="url(#ah)"/>

  <!-- 6 80 게이트 (분기) -->
  <rect x="120" y="1192" width="840" height="78" rx="14" fill="#f0fdf4" stroke="#86efac"/>
  <rect x="120" y="1192" width="12" height="78" rx="6" fill="#16a34a"/>
  <text x="160" y="1226" fill="#15803d" font-size="21" font-weight="bold">⑥ 평가 → 80점 게이트 (구독 직접 판정)</text>
  <text x="160" y="1254" fill="#0f172a" font-size="16">라이브 유용성 1~100 · </text>
  <text x="356" y="1254" fill="#b91c1c" font-size="16" font-weight="bold">80점 미만 = 컷</text>
  <text x="540" y="1254" fill="#0f172a" font-size="16">· 통과분만 다음 단계로</text>
  <!-- 컷 분기 화살표 -->
  <line x1="960" y1="1231" x2="1020" y2="1231" stroke="#b91c1c" stroke-width="3" marker-end="url(#ahr)"/>
  <text x="1014" y="1222" text-anchor="end" fill="#b91c1c" font-size="13" font-weight="bold">탈락</text>
  <line x1="540" y1="1270" x2="540" y2="1286" stroke="#94a3b8" stroke-width="4" marker-end="url(#ah)"/>

  <!-- 7 출시 (사람 승인 게이트) -->
  <rect x="120" y="1288" width="840" height="78" rx="14" fill="#f0f9ff" stroke="#7dd3fc"/>
  <rect x="120" y="1288" width="12" height="78" rx="6" fill="#0ea5e9"/>
  <text x="160" y="1322" fill="#075985" font-size="21" font-weight="bold">⑦ 출시 — DB(approved) · 카탈로그 카드 · 에이전트 페이지 · 배포 (API)</text>
  <text x="160" y="1350" fill="#0f172a" font-size="16">★ 프로덕션 변경 = </text>
  <text x="338" y="1350" fill="#15803d" font-size="16" font-weight="bold">사람 승인 게이트</text>
  <text x="500" y="1350" fill="#0f172a" font-size="16">· 별도검증 기능·정합·접근성 (curl 200 금지)</text>

  <text x="540" y="1410" text-anchor="middle" fill="#64748b" font-size="17">게이트 2곳: ④ 80점 · ⑦ 사람 승인  ·  색 = 비용 경계(파랑 구독 · 노랑 API · 초록 게이트)</text>
</svg>
